name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string
      tag_name:
        description: Optional release tag override
        required: false
        type: string
      target_commitish:
        description: Optional commit or branch to build and publish
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.release.outputs.release_version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      target_commitish: ${{ steps.release.outputs.target_commitish }}

    steps:
      - name: Resolve release metadata
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          INPUT_TARGET_COMMITISH: ${{ inputs.target_commitish }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            version="$INPUT_VERSION"
            tag_name="${INPUT_TAG_NAME:-v$version}"
            target_commitish="${INPUT_TARGET_COMMITISH:-$SHA}"
          else
            tag_name="$REF_NAME"
            version="${tag_name#v}"
            target_commitish="$SHA"
          fi

          echo "release_version=$version" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "target_commitish=$target_commitish" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_commitish || github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Effect diagnostics
        run: bun run diagnostics:effect

      - name: Test
        run: bun run test

      - name: Release smoke
        run: bun run release:smoke

  build:
    runs-on: ${{ matrix.os }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - kind: desktop
            os: ubuntu-latest
            name: linux-x64
            platform: linux
            arch: x64
            targets: AppImage,deb
            server_targets: bun-linux-x64-modern
            output_dir: dist/release-artifacts/desktop/linux-x64
          - kind: desktop
            os: ubuntu-latest
            name: linux-arm64
            platform: linux
            arch: arm64
            targets: AppImage,deb
            server_targets: bun-linux-arm64-modern
            output_dir: dist/release-artifacts/desktop/linux-arm64
          - kind: desktop
            os: macos-14
            name: macos-arm64
            platform: mac
            arch: arm64
            targets: dmg
            server_targets: bun-darwin-arm64-modern
            output_dir: dist/release-artifacts/desktop/macos-arm64
          - kind: desktop
            os: windows-latest
            name: windows-x64
            platform: win
            arch: x64
            targets: nsis
            server_targets: bun-windows-x64-modern
            output_dir: dist/release-artifacts/desktop/windows-x64
          - kind: standalone
            os: ubuntu-latest
            name: linux-x64
            server_target: bun-linux-x64-modern
            output_dir: dist/release-artifacts/standalone/linux-x64
          - kind: standalone
            os: ubuntu-latest
            name: linux-arm64
            server_target: bun-linux-arm64-modern
            output_dir: dist/release-artifacts/standalone/linux-arm64
          - kind: standalone
            os: macos-14
            name: macos-arm64
            server_target: bun-darwin-arm64-modern
            output_dir: dist/release-artifacts/standalone/macos-arm64
          - kind: standalone
            os: windows-latest
            name: windows-x64
            server_target: bun-windows-x64-modern
            output_dir: dist/release-artifacts/standalone/windows-x64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.target_commitish }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop artifact
        if: matrix.kind == 'desktop'
        env:
          BAYESGROVE_SERVER_TARGETS: ${{ matrix.server_targets }}
          CSC_LINK: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          GLADE_REQUIRE_AZURE_TRUSTED_SIGNING: ${{ matrix.platform == 'win' && 'true' || 'false' }}
          AZURE_TRUSTED_SIGNING_PUBLISHER_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_PUBLISHER_NAME }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
        run: node ./scripts/build-desktop-artifact.ts --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --targets ${{ matrix.targets }} --version ${{ needs.preflight.outputs.release_version }} --publish never --output-dir ${{ matrix.output_dir }}

      - name: Build standalone artifact
        if: matrix.kind == 'standalone'
        run: node ./scripts/build-standalone-server.ts --target ${{ matrix.server_target }} --version ${{ needs.preflight.outputs.release_version }} --output-dir ${{ matrix.output_dir }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.kind }}-${{ matrix.name }}
          path: ${{ matrix.output_dir }}/**
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - preflight
      - build

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist/release-publish

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.preflight.outputs.tag_name }}
          TARGET_COMMITISH: ${{ needs.preflight.outputs.target_commitish }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$TAG_NAME" --target "$TARGET_COMMITISH"
          else
            gh release create "$TAG_NAME" --title "$TAG_NAME" --target "$TARGET_COMMITISH" --notes ""
          fi

          mapfile -t files < <(find dist/release-publish -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No build artifacts were downloaded" >&2
            exit 1
          fi

          gh release upload "$TAG_NAME" "${files[@]}" --clobber
