name: PR Vouch

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  vouch:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      # pull_request_target runs in the context of the base branch by default.
      # This is intentional, so we read the trusted .github/VOUCHED list from
      # the target branch, preventing attackers from modifying the list in their PR.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/VOUCHED

      - name: Check vouch status
        id: check
        run: |
          if grep -Fxq '${{ github.actor }}' .github/VOUCHED; then
            echo "is_vouched=true" >> $GITHUB_OUTPUT
          else
            echo "is_vouched=false" >> $GITHUB_OUTPUT
          fi

      - name: Apply Vouch Labels
        uses: actions/github-script@v7
        with:
          script: |
            const isVouched = '${{ steps.check.outputs.is_vouched }}' === 'true';
            
            const prLabels = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const hasDenounced = prLabels.data.some(label => label.name === 'vouch:denounced');
            
            if (hasDenounced) {
              console.log('PR is denounced, skipping automatic vouching.');
              return;
            }

            if (isVouched) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['vouch:trusted']
              });
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: 'vouch:unvouched'
                });
              } catch (e) {
                if (e.status !== 404) throw e;
              }
            } else {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['vouch:unvouched']
              });
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: 'vouch:trusted'
                });
              } catch (e) {
                if (e.status !== 404) throw e;
              }
            }
