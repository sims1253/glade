name: ci

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Cache Bun and Turbo
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bun x playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Effect diagnostics
        run: bun run diagnostics:effect

      - name: Test (Unit)
        run: bun run test

      - name: Install Playwright Chromium
        run: bun run --cwd apps/web test:browser:install

      - name: Test (Browser)
        run: bun run test:browser

      - name: Build
        run: bun run build

      - name: Build Desktop Bundle
        run: bun run build:desktop-bundle

      - name: Test (Desktop Smoke)
        run: bun run test:desktop-smoke

      - name: Verify Artifacts
        run: |
          test -f apps/web/dist/index.html
          test -f apps/desktop/dist-electron/main.cjs
          test -f apps/desktop/dist-electron/preload.cjs
          test -f apps/server/dist/index.mjs

      - name: Assert Bridge Strings in Preload
        run: |
          grep -q "glade:select-file-path" apps/desktop/dist-electron/preload.cjs
          grep -q "glade:get-update-state" apps/desktop/dist-electron/preload.cjs

  integration:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'vouch:trusted')

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - uses: r-lib/actions/setup-r@v2

      - name: Cache Bun and Turbo
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install bayesgrove
        shell: bash
        run: |
          Rscript -e 'install.packages("pak", repos = "https://cloud.r-project.org")'
          Rscript -e 'pak::pkg_install("sims1253/bayesgrove")'

      - name: Server integration tests
        run: bun run --cwd apps/server test:integration
